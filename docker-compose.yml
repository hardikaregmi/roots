services:
  postgres:
    image: postgres:16
    container_name: roots-postgres
    restart: always
    environment:
      POSTGRES_DB: roots_db
      POSTGRES_USER: roots_user
      POSTGRES_PASSWORD: roots_password
    ports:
      - "5434:5432"
    volumes:
      - roots_postgres_data:/var/lib/postgresql/data

volumes:
  roots_postgres_data: